<!DOCTYPE html>
<html>
<head>
<title>RTUHub</title>
<link rel="stylesheet" href="style.css">
</head>
<style>
#welcome{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:35px;
z-index:9999;
}

</style>
<body>
<div id="welcome">
<h1>Welcome to RTUHub</h1>
</div>
<header>
<h1>RTUHub</h1>
<nav>
<a href="#">Home</a>
<a href="#">Notes</a>
<a href="#">PYQ</a>
<a href="#">Books</a>
</nav>
</header>

<section class="hero">
<h2>One Stop Platform for RTU Students</h2>
<button>Browse Notes</button>
<button>View PYQ</button>
</section>

<section class="cards">
<div class="card">Notes</div>
<div class="card">PYQ</div>
<div class="card">Important Questions</div>
<div class="card">Books</div>
</section>

<section class="notice">
<h2>Latest Notices</h2>
<ul>
<li>Exam Form Released</li>
<li>Semester Schedule</li>
</ul>
</section>

<footer>
<p>RTUHub © 2026</p>
</footer>

</body>
</html>
<script>

if(!localStorage.getItem("visit")){

setTimeout(function(){
document.getElementById("welcome").style.display="none";
},3000);

localStorage.setItem("visit","yes");

}else{

document.getElementById("welcome").style.display="none";

}

</script>

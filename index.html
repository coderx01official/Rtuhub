<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rtuhub.in · engineering nexus</title>
  <!-- Favicon - Engineering Logo -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230b0c15'/><circle cx='50' cy='40' r='20' stroke='%233f7eff' stroke-width='5' fill='none'/><path d='M50 40 L70 70' stroke='%23ffaa33' stroke-width='5'/><path d='M50 40 L30 70' stroke='%2366ccff' stroke-width='5'/><circle cx='50' cy='40' r='5' fill='%23ffd966'/><text x='50' y='85' font-size='12' text-anchor='middle' fill='%23ffffff' font-family='Arial' font-weight='bold'>RTU</text></svg>">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <!-- Math.js for calculations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.7.0/math.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Poppins', sans-serif;
      background: #0b0c15;
      color: #fff;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ===== INTRO ANIMATION ===== */
    #intro {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 30% 30%, #0f1425, #030514);
      display: flex; justify-content: center; align-items: center;
      z-index: 200; transition: opacity 0.8s ease, visibility 0.8s;
      flex-direction: column;
    }
    #intro.hide { opacity: 0; visibility: hidden; }

    .welcome-title {
      text-align: center;
      margin-bottom: 2rem;
    }
    .welcome-line {
      font-size: clamp(1.8rem, 6vw, 4rem);
      font-weight: 800;
      letter-spacing: 2px;
      color: white;
      text-shadow: 0 0 20px #3f7eff;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.2rem;
      padding: 0 1rem;
      line-height: 1.2;
    }
    .welcome-letter {
      display: inline-block;
      opacity: 0;
      transform: translateY(30px);
      animation: letterAppear 0.3s forwards;
      background: linear-gradient(145deg, #fff, #b2ceff, #5f8eff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    @keyframes letterAppear {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Fields animation */
    .fields-container {
      position: relative;
      height: 200px;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }
    .field-item {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.4s ease;
      pointer-events: none;
    }
    .field-item.active {
      opacity: 1;
      transform: translateY(0);
    }
    .field-item i {
      font-size: 4rem;
      filter: drop-shadow(0 0 30px #3f7eff);
    }
    .field-item span {
      font-size: 3.5rem;
      font-weight: 700;
      background: linear-gradient(145deg, #fff, #ffd966);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px #ffaa33;
    }

    .computer i { color: #00ffcc; animation: pulse 2s infinite; }
    .it i { color: #7ec8ff; animation: pulse 2s infinite; }
    .civil i { color: #a5d6ff; animation: bounce 2s infinite; }
    .chemical i { color: #6effa0; animation: bubble 2s infinite; }
    .mechanical i { color: #ffb347; animation: gearRotate 3s infinite; }
    .aero i { color: #ff7e5f; animation: fly 2.5s infinite; }

    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } }
    @keyframes bounce { 0% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes bubble { 0% { transform: scale(1); } 50% { transform: scale(1.2); } }
    @keyframes gearRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes fly { 0% { transform: translateX(0); } 100% { transform: translateX(20px) translateY(-10px); } }

    .floating-icons {
      position: absolute; top: 50%; left: 50%; width: 100%; height: 100%;
      transform: translate(-50%, -50%); pointer-events: none; z-index: 0;
    }
    .floating-icons i {
      position: absolute; font-size: 2.5rem; color: rgba(255,255,255,0.12);
      filter: drop-shadow(0 0 20px #3f7eff);
      animation: floatAround 12s infinite alternate ease-in-out;
    }
    @keyframes floatAround {
      0% { transform: translate(0,0); opacity:0.2; }
      100% { transform: translate(20px,-20px); opacity:0.5; }
    }

    @media (max-width: 700px) {
      .field-item span { font-size: 2rem; }
      .field-item i { font-size: 2.5rem; }
    }

    /* ===== YEAR SELECTION ===== */
    #yearSelection {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 30% 30%, #1a1f35, #030514);
      z-index: 150; display: flex; justify-content: center; align-items: center;
      transition: opacity 0.8s ease, visibility 0.8s;
      opacity: 0; visibility: hidden;
    }
    #yearSelection.show { opacity: 1; visibility: visible; }
    .year-box {
      background: rgba(5,10,25,0.7); backdrop-filter: blur(20px);
      border: 3px solid #3f7eff; border-radius: 60px; padding: 3rem;
      box-shadow: 0 0 80px #3f7eff; text-align: center; max-width: 600px; width: 90%;
    }
    .year-box h2 {
      font-size: 2.5rem; margin-bottom: 2.5rem;
      background: linear-gradient(145deg,#fff,#b2ceff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .year-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
    .year-btn {
      background: rgba(20,28,55,0.9); border: 2px solid #5f8eff;
      border-radius: 40px; padding: 1.2rem 0.5rem; font-size: 1.5rem;
      font-weight: 700; color: white; cursor: pointer; transition: 0.3s;
      box-shadow: 0 0 20px #3f7eff;
    }
    .year-btn:hover { background: #3f6ac0; transform: scale(1.05); }

    /* ===== BRANCH SELECTION ===== */
    #branchSelection {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 30% 30%, #1a1f35, #030514);
      z-index: 140; display: flex; justify-content: center; align-items: center;
      transition: opacity 0.8s ease, visibility 0.8s;
      opacity: 0; visibility: hidden;
    }
    #branchSelection.show { opacity: 1; visibility: visible; }
    .branch-box {
      background: rgba(5,10,25,0.8); backdrop-filter: blur(20px);
      border: 3px solid #ffaa33; border-radius: 50px; padding: 2rem;
      box-shadow: 0 0 80px #ffaa33; text-align: center; max-width: 800px; width: 95%;
      max-height: 80vh; overflow-y: auto;
    }
    .branch-box h2 {
      font-size: 2rem; margin-bottom: 1.5rem;
      background: linear-gradient(145deg,#fff,#ffd966);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .branch-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;
    }
    .branch-btn {
      background: rgba(20,28,55,0.9); border: 2px solid #ffaa33;
      border-radius: 30px; padding: 1rem 0.5rem; font-size: 1.1rem;
      font-weight: 600; color: white; cursor: pointer; transition: 0.3s;
      text-align: left; padding-left: 1rem;
    }
    .branch-btn:hover { background: #b37400; transform: translateX(5px); }

    /* ===== MAIN DASHBOARD ===== */
    #main {
      opacity: 0; visibility: hidden; padding: 2rem; max-width: 1400px;
      margin: 0 auto; transition: opacity 1s ease; position: relative;
    }
    #main.show { opacity: 1; visibility: visible; }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      padding: 0 0.5rem;
    }
    
    /* Left section with menu and logo */
    .header-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    /* ===== ANIMATED ROTATING LOGO ===== */
    .engineering-logo {
      width: 45px;
      height: 45px;
      background: linear-gradient(145deg, #1f2b5c, #0f1a3a);
      border: 2px solid #3f7eff;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 15px #3f7eff;
      transition: 0.3s;
      animation: rotateLogo 8s infinite linear, pulseGlow 3s infinite alternate, borderColor 10s infinite alternate;
    }
    .engineering-logo:hover {
      transform: scale(1.1);
      animation: rotateLogo 4s infinite linear, pulseGlow 1s infinite alternate;
    }
    .engineering-logo svg {
      width: 35px;
      height: 35px;
      animation: rotateLogo 8s infinite linear reverse;
    }
    .engineering-logo:hover svg {
      animation: rotateLogo 4s infinite linear reverse;
    }
    
    @keyframes rotateLogo {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pulseGlow {
      0% { box-shadow: 0 0 10px #3f7eff, 0 0 20px #3f7eff; }
      100% { box-shadow: 0 0 25px #ffaa33, 0 0 40px #ffaa33; }
    }
    @keyframes borderColor {
      0% { border-color: #3f7eff; }
      25% { border-color: #ff6b6b; }
      50% { border-color: #6bff6b; }
      75% { border-color: #ffaa33; }
      100% { border-color: #c76bff; }
    }

    .menu-left {
      background: rgba(20,28,55,0.7);
      backdrop-filter: blur(8px);
      border: 2px solid #3f7eff;
      border-radius: 10px;
      padding: 0.4rem 0.6rem;
      cursor: pointer;
      box-shadow: 0 0 12px #3f7eff;
      transition: 0.3s;
    }
    .menu-left:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #5f8eff;
    }
    .menu-left i { font-size: 1.5rem; color: #aac3ff; }
    
    .heading-text h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(145deg, #fff, #b2ceff, #5f8eff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: floatColorful 5s infinite ease-in-out;
      display: inline-block;
      letter-spacing: 1px;
    }
    
    @keyframes floatColorful {
      0% {
        transform: translateY(0);
        filter: drop-shadow(0 0 15px #3f7eff);
        background: linear-gradient(145deg, #fff, #b2ceff, #5f8eff);
        -webkit-background-clip: text;
      }
      5% {
        transform: translateY(-5px);
        filter: drop-shadow(0 0 20px #ff6b6b);
        background: linear-gradient(145deg, #ffd1d1, #ff6b6b, #ff3b3b);
        -webkit-background-clip: text;
      }
      10% {
        transform: translateY(0);
        filter: drop-shadow(0 0 20px #ffaa33);
        background: linear-gradient(145deg, #ffe6cc, #ffaa33, #ff8800);
        -webkit-background-clip: text;
      }
      15% {
        transform: translateY(-3px);
        filter: drop-shadow(0 0 20px #6bff6b);
        background: linear-gradient(145deg, #ccffcc, #6bff6b, #33ff33);
        -webkit-background-clip: text;
      }
      20% {
        transform: translateY(0);
        filter: drop-shadow(0 0 20px #6bd4ff);
        background: linear-gradient(145deg, #ccf0ff, #6bd4ff, #33b5ff);
        -webkit-background-clip: text;
      }
      25% {
        transform: translateY(-2px);
        filter: drop-shadow(0 0 20px #c76bff);
        background: linear-gradient(145deg, #f0ccff, #c76bff, #a833ff);
        -webkit-background-clip: text;
      }
      30% {
        transform: translateY(0);
        filter: drop-shadow(0 0 20px #ff6bc7);
        background: linear-gradient(145deg, #ffccf0, #ff6bc7, #ff33a8);
        -webkit-background-clip: text;
      }
      100% {
        transform: translateY(0);
        filter: drop-shadow(0 0 15px #3f7eff);
        background: linear-gradient(145deg, #fff, #b2ceff, #5f8eff);
        -webkit-background-clip: text;
      }
    }

    .map-button {
      background: rgba(20,40,70,0.9);
      backdrop-filter: blur(8px);
      border: 2px solid #ffaa33;
      border-radius: 10px;
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      box-shadow: 0 0 15px #ffaa33;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: 0.3s;
    }
    .map-button:hover {
      transform: scale(1.05);
      background: #b37400;
      box-shadow: 0 0 20px #ffaa33;
    }
    .map-button i {
      font-size: 1.3rem;
      color: #ffd966;
    }
    .map-button span {
      font-size: 0.9rem;
      font-weight: 600;
    }

    /* DROPDOWN MENU */
    .dropdown-menu {
      position: absolute;
      top: 70px;
      left: 10px;
      background: rgba(5, 10, 25, 0.95);
      backdrop-filter: blur(20px);
      border: 2px solid #3f7eff;
      border-radius: 20px;
      padding: 1rem;
      min-width: 250px;
      box-shadow: 0 0 30px #3f7eff;
      display: none;
      z-index: 100;
      transform-origin: top left;
      animation: slideDown 0.3s ease;
    }
    @keyframes slideDown {
      0% { opacity: 0; transform: translateY(-20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .dropdown-menu.show { display: block; }

    .menu-divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, #3f7eff, transparent);
      margin: 0.8rem 0;
    }

    .dropdown-item {
      padding: 0.8rem 1rem;
      margin: 0.3rem 0;
      border-radius: 12px;
      background: rgba(20,28,55,0.7);
      border: 1px solid #5f8eff;
      color: white;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .dropdown-item:hover {
      background: #3f6ac0;
      transform: translateX(5px);
      border-color: #ffaa33;
    }
    .dropdown-item i { font-size: 1.1rem; width: 20px; color: #ffd966; }

    .reset-item {
      background: #2a3a7a;
      border-color: #ffaa33;
      font-weight: 600;
    }

    /* ===== SEARCH BAR ===== */
    .search-container {
      display: flex; justify-content: center; margin: 1rem 0 2rem;
    }
    .search-bar {
      position: relative;
      display: flex;
      align-items: center;
      background: rgba(20,30,50,0.7);
      backdrop-filter: blur(10px);
      border: 2px solid #3f7eff;
      border-radius: 12px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 0 20px #3f7eff;
    }
    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #ffd966;
      font-size: 1.3rem;
      z-index: 2;
      animation: searchIconPulse 1.5s infinite ease-in-out;
    }
    @keyframes searchIconPulse {
      0% { opacity: 0.7; transform: translateY(-50%) scale(1); }
      50% { opacity: 1; transform: translateY(-50%) scale(1.1); }
      100% { opacity: 0.7; transform: translateY(-50%) scale(1); }
    }
    .search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 0.8rem 1rem 0.8rem 3rem;
      font-size: 1rem;
      color: white;
      outline: none;
      position: relative;
      z-index: 2;
      width: 100%;
    }
    .search-placeholder {
      position: absolute;
      left: 3rem;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      gap: 0.2rem;
      pointer-events: none;
      z-index: 1;
      opacity: 0.6;
    }
    .search-letter {
      font-size: 1rem;
      font-weight: 500;
      color: #b2ceff;
      opacity: 0;
      transform: translateY(10px);
      animation: searchLetterAppear 0.2s forwards;
    }
    @keyframes searchLetterAppear {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .selected-info {
      background: rgba(20,30,60,0.5); backdrop-filter: blur(5px);
      border: 1px solid #ffaa33; border-radius: 30px;
      padding: 0.5rem 1.5rem; margin: 0.5rem 0 1.5rem; text-align: center;
      display: inline-block; left: 50%; transform: translateX(-50%);
      position: relative;
    }
    .selected-info h3 {
      font-size: 1rem;
      font-weight: 500;
      background: linear-gradient(145deg, #fff, #ffd966);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ACTION GRID */
    .action-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin: 1.5rem auto;
    }
    .action-card {
      background: rgba(10,15,30,0.7);
      backdrop-filter: blur(8px);
      border: 2px solid #5f8eff;
      border-radius: 16px;
      padding: 1.2rem 0.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      box-shadow: 0 0 15px #3f7eff;
      transition: 0.3s;
      cursor: pointer;
      text-align: center;
    }
    .action-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 25px #5f8eff;
      border-color: #aac3ff;
    }
    .action-card i {
      font-size: 2rem;
      color: #aac3ff;
      filter: drop-shadow(0 0 8px #3f7eff);
      animation-duration: 3s;
      animation-iteration-count: infinite;
      animation-timing-function: ease-in-out;
    }
    .action-card:nth-child(1) i { animation-name: bookAnimation; }
    .action-card:nth-child(2) i { animation-name: magicAnimation; }
    .action-card:nth-child(3) i { animation-name: gearAnimation; }
    .action-card:nth-child(4) i { animation-name: flaskAnimation; }
    .action-card:nth-child(5) i { animation-name: layersAnimation; }
    .action-card:nth-child(6) i { animation-name: booksAnimation; }
    .action-card:nth-child(7) i { animation-name: rocketAnimation; }
    .action-card:nth-child(8) i { animation-name: clockAnimation; }
    .action-card:nth-child(9) i { animation-name: calendarAnimation; }
    .action-card:nth-child(10) i { animation-name: linkAnimation; }

    @keyframes bookAnimation {
      0%, 100% { transform: rotateY(0deg); }
      25% { transform: rotateY(30deg); }
      50% { transform: rotateY(0deg); }
      75% { transform: rotateY(-30deg); }
    }
    @keyframes magicAnimation {
      0%, 100% { transform: scale(1) rotate(0deg); color: #aac3ff; }
      20% { transform: scale(1.2) rotate(10deg); color: #ffd966; }
      40% { transform: scale(1) rotate(-5deg); color: #aac3ff; }
      60% { transform: scale(1.1) rotate(5deg); color: #c0a0ff; }
      80% { transform: scale(1) rotate(0deg); color: #aac3ff; }
    }
    @keyframes gearAnimation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes flaskAnimation {
      0%, 100% { transform: translateY(0); }
      25% { transform: translateY(-5px); color: #7ec8ff; }
      50% { transform: translateY(0); }
      75% { transform: translateY(-3px); color: #b0a0ff; }
    }
    @keyframes layersAnimation {
      0%, 100% { transform: translateY(0); }
      25% { transform: translateY(-5px); }
      50% { transform: translateY(5px); }
      75% { transform: translateY(-3px); }
    }
    @keyframes booksAnimation {
      0%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); color: #ffd966; }
      60% { transform: translateY(0); }
      80% { transform: translateY(-4px); color: #aac3ff; }
    }
    @keyframes rocketAnimation {
      0%, 100% { transform: scale(1) translateY(0); }
      25% { transform: scale(1.2) translateY(-5px); color: #ffaa66; }
      50% { transform: scale(1) translateY(0); }
      75% { transform: scale(1.1) translateY(-3px); color: #ffcc88; }
    }
    @keyframes clockAnimation {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(15deg); }
      75
